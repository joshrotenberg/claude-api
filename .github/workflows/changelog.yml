name: Changelog

# Post-release CHANGELOG regeneration. After release-plz publishes a
# new tag and creates a GitHub release, regenerate the headline-crate
# CHANGELOG from conventional commits via git-cliff and open a PR.
#
# Per-crate CHANGELOGs for claude-api-derive and claude-api-test are
# managed by release-plz natively; this workflow only touches
# crates/claude-api/CHANGELOG.md.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Update changelog
    # Skip for the sub-crates so we only regen on claude-api releases.
    # claude-api tags are bare `v0.x.y`; sub-crate tags are prefixed.
    if: ${{ !startsWith(github.event.release.tag_name, 'claude-api-derive-') && !startsWith(github.event.release.tag_name, 'claude-api-test-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.COMMITTER_TOKEN }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: crates/claude-api/CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create changelog PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          commit-message: "chore: regenerate changelog"
          branch: chore/update-changelog
          title: "chore: regenerate changelog"
          body: "Auto-generated changelog regeneration from git-cliff after the release."
          delete-branch: true
